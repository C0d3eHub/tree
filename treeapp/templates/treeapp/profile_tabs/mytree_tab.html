{% load static %}

<div class="mytree-container">
    {% if no_tree %}
        <div class="empty-state">
            <div class="empty-state-icon">🌳</div>
            <h3>Your Family Tree</h3>
            <p>Your account is not yet linked to the family tree. Please contact an administrator to set up your family connection.</p>
        </div>
    {% else %}
        <div id="tree-container" style="width: 100%; height: 70vh; position: relative;">
            <svg id="tree-svg" width="100%" height="100%"></svg>
            <div id="dynamic-modal-root" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 1000; pointer-events: none;">
                <!-- Modal content will be inserted here -->
            </div>
            <div class="tree-controls">
                <button id="reset-zoom" class="tree-control-btn">
                    <span class="control-icon">🔍</span>
                    <span class="control-text">Reset View</span>
                </button>
                <button id="expand-all" class="tree-control-btn">
                    <span class="control-icon">➕</span>
                    <span class="control-text">Expand All</span>
                </button>
                <button id="collapse-all" class="tree-control-btn">
                    <span class="control-icon">➖</span>
                    <span class="control-text">Collapse All</span>
                </button>
            </div>
        </div>
        
        <script>
            window.IS_MY_TREE = true;
            window.EDIT_MEMBER_URL = "{% url 'edit_member' 0 %}".replace('0', '{id}');
            window.USER_TREE_DATA = {{ tree_data_json|safe }};
            window.userNodeId = {{ member_id|default:"null" }};
            window.EDITABLE_ANCESTORS = {{ editable_ancestors|default:"[]"|safe }};
        </script>
    {% endif %}
</div>

<style>
    .mytree-container {
        position: relative;
        height: 75vh;
    }
    
    .tree-controls {
        position: absolute;
        top: 10px;
        right: 10px;
        display: flex;
        gap: 8px;
        z-index: 10;
    }
    
    .tree-control-btn {
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 6px 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        font-size: 0.9rem;
    }
    
    .tree-control-btn:hover {
        background: #f8f9fa;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    
    .control-icon {
        font-size: 1rem;
    }
    
    .empty-state {
        text-align: center;
        padding: 40px 20px;
        background: #f8f9fa;
        border-radius: 12px;
        max-width: 600px;
        margin: 0 auto;
    }
    
    .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 15px;
    }
    
    .empty-state h3 {
        color: #333;
        margin-bottom: 10px;
        font-size: 1.3rem;
    }
    
    .empty-state p {
        color: #666;
        font-size: 1rem;
        line-height: 1.5;
    }
    
    @media (max-width: 768px) {
        .control-text {
            display: none;
        }
        
        .tree-control-btn {
            padding: 6px;
        }
    }
</style>
