{% extends 'treeapp/base.html' %}
{% load static %}
{% block title %}Password Reset Complete | Family Tree{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="success-icon">✅</div>
        <h2>Password Reset Complete</h2>
        <div class="reset-message">
            <p>Your password has been set. You may now log in with your new password.</p>
        </div>
        <div class="auth-link">
            <a href="{% url 'login' %}" class="btn-primary">Log In</a>
        </div>
    </div>
</div>
<style>
.auth-container {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.auth-card {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 3px 24px 0 rgba(37, 80, 145, 0.15);
    padding: 2.5rem 1.5rem 1.5rem 1.5rem;
    margin: 2rem 0;
    text-align: center;
}
.success-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    color: #4CAF50;
}
.auth-card h2 {
    margin-bottom: 1.5rem;
    color: #1976d2;
}
.reset-message {
    color: #555;
    font-size: 1rem;
    line-height: 1.5;
    margin-bottom: 1.5rem;
}
.auth-link {
    margin-top: 1.6rem;
}
.btn-primary {
    background: linear-gradient(90deg,#1976d2,#64b5f6);
    color: #fff;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    padding: 10px 30px;
    font-size: 1.07rem;
    cursor: pointer;
    transition: background 0.18s;
    text-decoration: none;
    display: inline-block;
}
.btn-primary:hover {
    background: linear-gradient(90deg,#1565c0,#42a5f5);
}
@media (max-width: 480px) {
    .auth-card { max-width: 95vw; padding: 1.2rem; }
}
</style>
{% endblock %}
